name: Production CI/CD

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  client-ci:
    name: Client CI (Lint & Build)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install Client Dependencies
        run: npm ci
        working-directory: client

      - name: Lint Client (oxlint)
        run: npm run lint
        working-directory: client

      - name: Build Client
        run: npm run build
        working-directory: client

  server-ci:
    name: Server CI (Build)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install Server Dependencies
        run: npm ci
        working-directory: server

      - name: Build Server (Compile TS)
        run: npm run build
        working-directory: server
